categories:
  - name: Python Packages and CLI
    repositories:
      - name: click-app
        url: https://github.com/simonw/click-app
        description: Template for creating new Click command-line tools.
      - name: cookiecutter-pylibrary
        url: https://github.com/ionelmc/cookiecutter-pylibrary
        description: Enhanced template for Python libraries.
      - name: cookiecutter-pypackage
        url: https://github.com/audreyfeldroy/cookiecutter-pypackage
        description: Template for Python packages.
      - name: cookiecutter-pytest-plugin
        url: https://github.com/pytest-dev/cookiecutter-pytest-plugin
        description: Template for pytest plugins.
      - name: cookiecutter-uv
        url: https://github.com/osprey-oss/cookiecutter-uv
        description: Modern Python project template using uv.

  - name: Django
    repositories:
      - name: cookiecutter-django
        url: https://github.com/cookiecutter/cookiecutter-django
        description: Production-ready Django project template.
      - name: cookiecutter-django-rest
        url: https://github.com/agconti/cookiecutter-django-rest
        description: Template for building Django REST APIs.
      - name: cookiecutter-django-vue
        url: https://github.com/vchaptsev/cookiecutter-django-vue
        description: Template for Django and Vue projects.
      - name: django-saas-starter
        url: https://github.com/LVTD-LLC/django-saas-starter
        description: Django SaaS starter template with batteries included.
      - name: wemake-django-template
        url: https://github.com/wemake-services/wemake-django-template
        description: Django template focused on code quality and security.

  - name: Data Science and ML
    repositories:
      - name: cookiecutter-data-science
        url: https://github.com/drivendataorg/cookiecutter-data-science
        description: Logical, reasonably standardized project structure for data science work.
      - name: cookiecutter-mlops-package
        url: https://github.com/fmind/cookiecutter-mlops-package
        description: Template for building and deploying Python packages and Docker images for MLOps.
      - name: extension-cookiecutter-ts
        url: https://github.com/jupyterlab/extension-cookiecutter-ts
        description: Template for JupyterLab extensions in TypeScript.
      - name: scientific-python/cookie
        url: https://github.com/scientific-python/cookie
        description: Scientific Python library development guide and project template.

  - name: Web Apps and APIs
    repositories:
      - name: cookiecutter-fastapi
        url: https://github.com/arthurhenrique/cookiecutter-fastapi
        description: FastAPI project template.
      - name: cookiecutter-flask
        url: https://github.com/cookiecutter-flask/cookiecutter-flask
        description: Flask application template.
      - name: FastAPI-template
        url: https://github.com/s3rius/FastAPI-template
        description: Feature-rich FastAPI project template.
      - name: cookiecutter-vue
        url: https://github.com/vuejs-templates/webpack
        description: Vue.js webpack template.

  - name: DevOps and Infrastructure
    repositories:
      - name: cookiecutter-ansible-role
        url: https://github.com/iknite/cookiecutter-ansible-role
        description: Template for Ansible roles.
      - name: terraform-module-cookiecutter
        url: https://github.com/TerraformInDepth/terraform-module-cookiecutter
        description: Template for Terraform modules.

  - name: Other Languages and Platforms
    repositories:
      - name: cookiecutter-golang
        url: https://github.com/lacion/cookiecutter-golang
        description: Template for Go projects.

  - name: Template Tools and Resources
    repositories:
      - name: cookiecutter
        url: https://github.com/cookiecutter/cookiecutter
        description: The command-line utility that creates projects from templates.
      - name: copier
        url: https://github.com/copier-org/copier
        description: Library and command-line utility for rendering project templates.
      - name: cruft
        url: https://github.com/cruft/cruft
        description: Tool for updating projects generated from Cookiecutter templates.
      - name: awesome-selfhosted
        url: https://github.com/awesome-selfhosted/awesome-selfhosted
        description: Reference example of a large Awesome list.
      - name: awesome-python
        url: https://github.com/vinta/awesome-python
        description: Reference example of a Python Awesome list.
      - name: awesome-django
        url: https://github.com/wsvincent/awesome-django
        description: Reference example of a Django Awesome list.

  - name: Archived Templates
    repositories:
      - name: cookiecutter-djangopackage
        url: https://github.com/pydanny/cookiecutter-djangopackage
        description: Archived template for reusable Django packages.
        archived: true
